<!DOCTYPE html>                                                                                                                                                                                                                                                                                                            
  <html lang="ru">
  <head>                                                                                                                                                                                                                                                                                                                     
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming soon</title>                                                                                                                                                                                                                                                                                               
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }                                                                                                                                                                                                                                                                   
                       
      body {
        min-height: 100vh;
        display: flex;                                                                                                                                                                                                                                                                                                       
        align-items: center;
        justify-content: center;                                                                                                                                                                                                                                                                                             
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0e0e0e;                                                                                                                                                                                                                                                                                                 
        color: #f0f0f0;
        text-align: center;                                                                                                                                                                                                                                                                                                  
        padding: 2rem; 
      }

      h1 {                                                                                                                                                                                                                                                                                                                   
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 300;                                                                                                                                                                                                                                                                                                    
        letter-spacing: -0.02em;                            
        margin-bottom: 1rem;                                                                                                                                                                                                                                                                                                 
      }
                                                                                                                                                                                                                                                                                                                             
      p {                                                   
        color: #888;
        font-size: 1rem;
      }

      .dot {
        display: inline-block;
        width: 8px;                                                                                                                                                                                                                                                                                                          
        height: 8px;
        background: #f0f0f0;                                                                                                                                                                                                                                                                                                 
        border-radius: 50%;                                 
        margin-left: 4px;
        animation: blink 1.2s infinite;
      }                                                                                                                                                                                                                                                                                                                      
   
      @keyframes blink {                                                                                                                                                                                                                                                                                                     
        0%, 100% { opacity: 1; }                            
        50%      { opacity: 0.2; }
      }                                                                                                                                                                                                                                                                                                                      
    </style>
  </head>                                                                                                                                                                                                                                                                                                                    
  <body>                                                    
    <main>
      <h1>Coming soon<span class="dot"></span></h1>
    </main>    
  <script type="text/javascript">
    function hasRecallConsent() {
      // TODO: заменить на реальный CMP-чек. US: false при opt-out/GPC. EU/UK: true только после opt-in.
      return true;
    }

    function getVisitorId() {
      if (!hasRecallConsent()) {
        try { localStorage.removeItem('fm_vid'); } catch (e) {}
        return null;
      }
      try {
        var v = localStorage.getItem('fm_vid');
        if (!v) { v = crypto.randomUUID(); localStorage.setItem('fm_vid', v); }
        return v;
      } catch (e) { return null; }
    }

    function initEmbeddedMessaging() {
      try {
        embeddedservice_bootstrap.settings.language = 'en_US';

        window.addEventListener('onEmbeddedMessagingReady', function () {
          try {
            var vid = getVisitorId();
            console.log('[recall] visitor_id →', vid);   // <-- лог перед передачей
            if (vid) {
              embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({ visitor_id: vid });
              console.log('[recall] setHiddenPrechatFields sent:', { visitor_id: vid });
            } else {
              console.log('[recall] no visitor_id (no consent / storage blocked) — skipped');
            }
          } catch (e) { console.error('[recall] pre-chat error:', e); }
        });
  
        embeddedservice_bootstrap.init(
          '00DSu000006fyJJ',
          'test',
          'https://fleetcorna--uat2.sandbox.my.site.com/ESWtest1782476974101',
          { scrt2URL: 'https://fleetcorna--uat2.sandbox.my.salesforce-scrt.com' }
        );
      } catch (err) {
        console.error('Error loading Embedded Messaging: ', err);
      }
    }
  </script>
  <script type="text/javascript"
    src="https://fleetcorna--uat2.sandbox.my.site.com/ESWtest1782476974101/assets/js/bootstrap.min.js"
    onload="initEmbeddedMessaging()"></script>                                                                                                                                                                                                                                              
  </body>
  </html>
