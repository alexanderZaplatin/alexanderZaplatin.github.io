<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming soon</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0e0e0e;
      color: #f0f0f0;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    p {
      color: #888;
      font-size: 1rem;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #f0f0f0;
      border-radius: 50%;
      margin-left: 4px;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.2; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Coming soon<span class="dot"></span></h1>
    <p>Скоро здесь что-то появится.</p>
  </main>
</body>
</html>
