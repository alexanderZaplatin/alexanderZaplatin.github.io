<!DOCTYPE html>                                                                                                                                                                                                                                                                                                            
  <html lang="ru">
  <head>                                                                                                                                                                                                                                                                                                                     
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming soon</title>                                                                                                                                                                                                                                                                                               
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }                                                                                                                                                                                                                                                                   
                       
      body {
        min-height: 100vh;
        display: flex;                                                                                                                                                                                                                                                                                                       
        align-items: center;
        justify-content: center;                                                                                                                                                                                                                                                                                             
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0e0e0e;                                                                                                                                                                                                                                                                                                 
        color: #f0f0f0;
        text-align: center;                                                                                                                                                                                                                                                                                                  
        padding: 2rem; 
      }

      h1 {                                                                                                                                                                                                                                                                                                                   
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 300;                                                                                                                                                                                                                                                                                                    
        letter-spacing: -0.02em;                            
        margin-bottom: 1rem;                                                                                                                                                                                                                                                                                                 
      }
                                                                                                                                                                                                                                                                                                                             
      p {                                                   
        color: #888;
        font-size: 1rem;
      }

      .dot {
        display: inline-block;
        width: 8px;                                                                                                                                                                                                                                                                                                          
        height: 8px;
        background: #f0f0f0;                                                                                                                                                                                                                                                                                                 
        border-radius: 50%;                                 
        margin-left: 4px;
        animation: blink 1.2s infinite;
      }                                                                                                                                                                                                                                                                                                                      
   
      @keyframes blink {                                                                                                                                                                                                                                                                                                     
        0%, 100% { opacity: 1; }                            
        50%      { opacity: 0.2; }
      }                                                                                                                                                                                                                                                                                                                      
    </style>
  </head>                                                                                                                                                                                                                                                                                                                    
  <body>                                                    
    <main>
      <h1>Coming soon<span class="dot"></span></h1>
    </main>    

  <script>
  (() => {
    'use strict';

    const GLOBAL_KEY = 'SAL5099_POC';
    const EVENTS_KEY = 'sal5099.poc.events.v1';
    const STATE_KEY = 'sal5099.poc.state.v1';
    const WRAPPED = Symbol('sal5099.launchChatWrapped');

    const pageRunId =
      globalThis.crypto?.randomUUID?.() ??
      'sal5099-' + Date.now() + '-' + Math.random().toString(16).slice(2);

    const pageStartedAt = Date.now();

    if (window[GLOBAL_KEY]) {
      console.warn('[SAL5099] Logger is already installed on this page.');
      return;
    }

    const defaultState = () => ({
      wasMinimized: false,
      manualButtonClicked: false,
      launchCallNumber: 0
    });

    const parseStored = (key, fallback) => {
      try {
        const value = sessionStorage.getItem(key);
        return value ? JSON.parse(value) : fallback;
      } catch (error) {
        console.error('[SAL5099] Cannot read sessionStorage:', error);
        return fallback;
      }
    };

    const safeClone = value => {
      if (value === undefined) {
        return null;
      }

      try {
        const seen = new WeakSet();

        const json = JSON.stringify(value, (_key, item) => {
          if (typeof item === 'bigint') {
            return item.toString();
          }

          if (item instanceof Error) {
            return {
              name: item.name,
              message: item.message,
              stack: item.stack ?? null
            };
          }

          if (item && typeof item === 'object') {
            if (seen.has(item)) {
              return '[Circular]';
            }

            seen.add(item);
          }

          return item;
        });

        return json === undefined ? null : JSON.parse(json);
      } catch (error) {
        return {
          serializationError:
            error instanceof Error ? error.message : String(error),
          valueType: Object.prototype.toString.call(value)
        };
      }
    };

    const readEvents = () => {
      const events = parseStored(EVENTS_KEY, []);
      return Array.isArray(events) ? events : [];
    };

    let state = {
      ...defaultState(),
      ...parseStored(STATE_KEY, {})
    };

    const saveState = () => {
      try {
        sessionStorage.setItem(STATE_KEY, JSON.stringify(state));
      } catch (error) {
        console.error('[SAL5099] Cannot save state:', error);
      }
    };

    const record = (eventName, detail = null, metadata = {}) => {
      const events = readEvents();

      const entry = {
        sequence: events.length + 1,
        timestamp: new Date().toISOString(),
        epochMs: Date.now(),
        elapsedMs: Date.now() - pageStartedAt,
        pageRunId,
        href: globalThis.location?.href ?? null,
        event: eventName,
        detail: safeClone(detail),
        ...safeClone(metadata)
      };

      events.push(entry);

      try {
        sessionStorage.setItem(EVENTS_KEY, JSON.stringify(events));
      } catch (error) {
        console.error('[SAL5099] Cannot save event log:', error);
      }

      console.log(`[SAL5099 EVENT] ${eventName}`, entry);

      return entry;
    };

    const eventNames = [
      'onEmbeddedMessagingReady',
      'onEmbeddedMessagingButtonCreated',
      'onEmbeddedMessagingButtonClicked',
      'onEmbeddedMessagingConversationStarted',
      'onEmbeddedMessageSent',
      'onEmbeddedMessagingWindowMinimized',
      'onEmbeddedMessagingWindowMaximized',
      'onEmbeddedMessagingWindowClosed'
    ];

    const handleEmbeddedMessagingEvent = event => {
      const metadata = {};

      if (event.type === 'onEmbeddedMessagingButtonClicked') {
        state.manualButtonClicked = true;
        metadata.manualButtonClicked = true;
        saveState();
      }

      if (event.type === 'onEmbeddedMessagingWindowMinimized') {
        state.wasMinimized = true;
        metadata.derivedMetric = 'Agent Minimized';
        saveState();
      }

      if (event.type === 'onEmbeddedMessagingWindowMaximized') {
        metadata.wasMinimizedBefore = state.wasMinimized;

        metadata.derivedMetric = state.wasMinimized
          ? 'Agent Restored'
          : 'Initial or other maximization';

        state.wasMinimized = false;
        saveState();
      }

      if (event.type === 'onEmbeddedMessagingConversationStarted') {
        metadata.conversationIdCandidate =
          event.detail?.conversationId ??
          event.detail?.conversationEntry?.conversationId ??
          null;
      }

      if (event.type === 'onEmbeddedMessageSent') {
        metadata.senderRoleCandidate =
          event.detail?.conversationEntry?.sender?.role ??
          event.detail?.sender?.role ??
          null;

        metadata.entryTypeCandidate =
          event.detail?.conversationEntry?.entryType ??
          event.detail?.entryType ??
          null;

        metadata.messageTypeCandidate =
          event.detail?.conversationEntry?.entryPayload?.abstractMessage
            ?.messageType ??
          event.detail?.abstractMessage?.messageType ??
          null;

        metadata.formatTypeCandidate =
          event.detail?.conversationEntry?.entryPayload?.abstractMessage
            ?.formatType ??
          event.detail?.abstractMessage?.formatType ??
          null;
      }

      record(event.type, event.detail, metadata);

      if (
        event.type === 'onEmbeddedMessagingReady' ||
        event.type === 'onEmbeddedMessagingButtonCreated'
      ) {
        tryWrapLaunchChat(event.type);
      }
    };

    for (const eventName of eventNames) {
      window.addEventListener(
        eventName,
        handleEmbeddedMessagingEvent
      );
    }

    const tryWrapLaunchChat = trigger => {
      const utilApi = window.embeddedservice_bootstrap?.utilAPI;
      const current = utilApi?.launchChat;

      if (typeof current !== 'function') {
        return false;
      }

      if (current[WRAPPED]) {
        return true;
      }

      const original = current;

      const wrappedLaunchChat = function (...args) {
        state.launchCallNumber += 1;

        const callId =
          'launch-' + pageRunId + '-' + state.launchCallNumber;

        saveState();

        record(
          'SAL5099:launchChat:called',
          { args },
          {
            callId,
            manualButtonClickedBeforeCall: state.manualButtonClicked
          }
        );

        let result;

        try {
          result = original.apply(this, args);
        } catch (error) {
          record('SAL5099:launchChat:threw', error, { callId });
          throw error;
        }

        return Promise.resolve(result).then(
          value => {
            record(
              'SAL5099:launchChat:resolved',
              value,
              { callId }
            );

            return value;
          },
          error => {
            record(
              'SAL5099:launchChat:rejected',
              error,
              { callId }
            );

            throw error;
          }
        );
      };

      Object.defineProperty(wrappedLaunchChat, WRAPPED, {
        value: true
      });

      try {
        utilApi.launchChat = wrappedLaunchChat;
      } catch (error) {
        record(
          'SAL5099:launchChat:wrapFailed',
          error,
          { trigger }
        );

        return true;
      }

      if (utilApi.launchChat !== wrappedLaunchChat) {
        record(
          'SAL5099:launchChat:wrapFailed',
          {
            reason: 'launchChat assignment was ignored'
          },
          { trigger }
        );

        return true;
      }

      record(
        'SAL5099:launchChat:wrapped',
        null,
        { trigger }
      );

      return true;
    };

    const publicApi = Object.freeze({
      version: '1.0.0',

      events: () => safeClone(readEvents()),

      export: () => JSON.stringify(readEvents(), null, 2),

      mark: label =>
        record('SAL5099:marker', {
          label: String(label)
        }),

      clear: () => {
        sessionStorage.removeItem(EVENTS_KEY);
        sessionStorage.removeItem(STATE_KEY);
        state = defaultState();

        console.log('[SAL5099] Log and state cleared.');
      }
    });

    Object.defineProperty(window, GLOBAL_KEY, {
      value: publicApi,
      configurable: false,
      enumerable: true,
      writable: false
    });

    record('SAL5099:logger:installed', {
      version: publicApi.version,
      pageRunId
    });

    if (!tryWrapLaunchChat('logger-install')) {
      const wrapStartedAt = Date.now();

      const wrapTimer = setInterval(() => {
        if (
          tryWrapLaunchChat('poll') ||
          Date.now() - wrapStartedAt >= 30000
        ) {
          clearInterval(wrapTimer);
        }
      }, 50);
    }
  })();
  </script>

  <script
    type='text/javascript'
    src='https://fleetcorna--uat2.sandbox.my.site.com/ESWFuelman1773662742319/assets/js/bootstrap.min.js'
    onload='initEmbeddedMessaging()'>
  </script>
                                                                                                                                                                                                                               
  </body>
  </html>
