<!DOCTYPE html>                                                                                                                                                                                                                                                                                                            
  <html lang="ru">
  <head>                                                                                                                                                                                                                                                                                                                     
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming soon</title>                                                                                                                                                                                                                                                                                               
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }                                                                                                                                                                                                                                                                   
                       
      body {
        min-height: 100vh;
        display: flex;                                                                                                                                                                                                                                                                                                       
        align-items: center;
        justify-content: center;                                                                                                                                                                                                                                                                                             
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0e0e0e;                                                                                                                                                                                                                                                                                                 
        color: #f0f0f0;
        text-align: center;                                                                                                                                                                                                                                                                                                  
        padding: 2rem; 
      }

      h1 {                                                                                                                                                                                                                                                                                                                   
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 300;                                                                                                                                                                                                                                                                                                    
        letter-spacing: -0.02em;                            
        margin-bottom: 1rem;                                                                                                                                                                                                                                                                                                 
      }
                                                                                                                                                                                                                                                                                                                             
      p {                                                   
        color: #888;
        font-size: 1rem;
      }

      .dot {
        display: inline-block;
        width: 8px;                                                                                                                                                                                                                                                                                                          
        height: 8px;
        background: #f0f0f0;                                                                                                                                                                                                                                                                                                 
        border-radius: 50%;                                 
        margin-left: 4px;
        animation: blink 1.2s infinite;
      }                                                                                                                                                                                                                                                                                                                      
   
      @keyframes blink {                                                                                                                                                                                                                                                                                                     
        0%, 100% { opacity: 1; }                            
        50%      { opacity: 0.2; }
      }                                                                                                                                                                                                                                                                                                                      
    </style>
  </head>                                                                                                                                                                                                                                                                                                                    
  <body>                                                    
    <main>
      <h1>Coming soon<span class="dot"></span></h1>
    </main>                                                                                                                                                                                                                                                                                                                  
   
 <!-- 1. Существующий init -->
  <script type='text/javascript'>
      function initEmbeddedMessaging() {
          try {
              embeddedservice_bootstrap.settings.language = 'en_US';
              embeddedservice_bootstrap.init(
                  '00DSu000006fyJJ',                                                                                                                                                                                                                                                                  
                  'Fuelman_Agent_AI',
                  'https://fleetcorna--uat2.sandbox.my.site.com/ESWFuelman1773662742319',
                  {
                      scrt2URL: 'https://fleetcorna--uat2.sandbox.my.salesforce-scrt.com'
                  }
              );
          } catch (err) {                                                                                                                                                                                                                                                                             
              console.error('Error loading Embedded Messaging: ', err);
          }
      };
  </script>
                                                                                                                                                                                                                                                                                                      
  <!-- 2. Geolocation capture (нужен зарегистрированный listener ДО init) -->
  <script type='text/javascript'>
      window.addEventListener('onEmbeddedMessagingReady', function () {
          if (!navigator.geolocation) return;
          navigator.geolocation.getCurrentPosition(
              function (pos) {
                  try {                                                                                                                                                                                                                                                                               
                      embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({
                          User_Latitude: String(pos.coords.latitude),
                          User_Longitude: String(pos.coords.longitude)
                      });
                      console.info('[MIAW] geo set:', pos.coords.latitude, pos.coords.longitude);
                  } catch (e) {
                      console.error('[MIAW] setHiddenPrechatFields failed:', e);
                  }
              },
              function (err) { console.warn('[MIAW] geo denied:', err.message); },
              { timeout: 5000, maximumAge: 300000, enableHighAccuracy: false }
          );
      });
  </script>
  
  <!-- 3. Bootstrap.min.js -->                                                                                                                                                                                                                                                                        
  <script type='text/javascript' src='https://fleetcorna--uat2.sandbox.my.site.com/ESWFuelman1773662742319/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>                                                                                                                                                                                                                                                                  
  </body>
  </html>
